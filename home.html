<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Home</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- tailwind css + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- themes -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
   * {
     font-family: "Outfit", sans-serif;
    }
    </style>
</head>
<body class="min-h-screen bg-base-200 max-w-md mx-auto">
   <section class="Home-design bg-base-100 rounded-b-3xl">
     <header class="border-b-2 border-gray-300 sticky top-0 bg-base-100 z-10">
        <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
            <div class="left flex gap-1 items-center">
                <div class="logo w-[60px]">
                    <img src="./assets/logo.png" alt="">
                </div>
                <div class="balance-info">
                    <h2 class="text-xl font-extrabold">$<span id="balance">45000</span></h2>
                    <p class="text-neutral/50">Available Balance</p>
                </div>
            </div>
            <div class="right">
                <a href="/index.html" class="btn btn-soft text-neutral/50 text-sm rounded-lg"><i class="fa-solid fa-arrow-right-from-bracket"></i> Log Out</a>
            </div>
        </section>
    </header>

    <section class="w-11/12 mx-auto py-6 space-y-5">
        <h2 class="text-2xl font-bold">Welcome to Pay<span class="text-primary">oo</span></h2>
        <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>

        <div class="buttons grid grid-cols-3 gap-4">
            <button onclick="showOnly('add-money')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-1.png" alt="">
                <p>Add Money</p>
            </button>
            <button onclick="showOnly('cashout')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-2.png" alt="">
                <p>Cashout</p>
            </button>
            <button onclick="showOnly ('send-money')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-3.png" alt="">
                <p>Send Money</p>
            </button>
            <button onclick="showOnly ('get-bonus')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-4.png" alt="">
                <p>Get Bonus</p>
            </button>
            <button onclick="showOnly ('pay-bill')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-5.png" alt="">
                <p>Pay Bill</p>
            </button>
            <button onclick="showOnly ('history')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-6.png" alt="">
                <p>Transactions</p>
            </button>
        </div>
    </section>
   </section>

    <section id="add-money" class="w-11/12 mx-auto py-4 hidden">
        <h2 class="text-xl text-nutral font-semibold pb-4">Add Money</h2>
       <div class="card bg-base-100 w-full shadow-xl mx-auto rounded-3xl">
       <div class="card-body">
        <fieldset class="fieldset text-xl">
          <label class="label mb-2 text-neutral/70 font-medium">Select A Bank</label>
          <select id="add-money-bank" class="select w-full rounded-full text-neutral/60 text-lg bg-base-200 border-none mb-2">
             <option disabled selected>Select bank</option>
             <option value="DBBL">DBBL</option>
             <option value="IBBL">IBBL</option>
             <option value="City Bank">City Bank</option>
          </select>
          <label class="label mb-2 text-neutral/70 font-medium">Bank Account Number</label>
          <input id="add-money-account" type="number" class="input rounded-full bg-base-200 text-lg mb-2 border-none w-full" placeholder="Enter 11 digit account number"/>
          <label class="label mb-2 text-neutral/70 font-medium">Amount to Add</label>
          <input id="add-money-amount" type="number" class="input rounded-full bg-base-200 text-lg mb-2 border-none w-full" placeholder="Add Amount to withdraw"/>
          <label class="label mb-2 text-neutral/70 font-medium">Pin Number</label>
          <input id="add-money-pin" maxlength="4" type="password" class="input rounded-full bg-base-200 text-lg border-none w-full" placeholder="Enter 4 digit pin number" />
          <button id="add-money-btn" class="btn btn-primary mt-4 rounded-full">Add Money</button>
        </fieldset>
      </div>
    </div>
    </section>

    <section id="cashout" class="w-11/12 mx-auto py-4 hidden">
        <h2 class="text-xl text-nutral font-semibold pb-4">Cash Out</h2>
         <div class="card bg-base-100 w-full shadow-xl mx-auto rounded-3xl">
      <div class="card-body">
        <fieldset class="fieldset text-xl">
          <label class="label mb-2 text-neutral/70 font-medium">Agent Number</label>
          <input id="cashout-number" maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200 text-lg mb-2 border-none w-full" placeholder="Enter 11 digit number"/>
          <label class="label mb-2 text-neutral/70 font-medium">Amount</label>
          <input id="cashout-amount" type="number" class="input rounded-full bg-base-200 text-lg mb-2 border-none w-full" placeholder="Enter amount to withdraw"/>
          <label class="label mb-2 text-neutral/70 font-medium">Pin Number</label>
          <input id="cashout-pin" maxlength="4" type="password" class="input rounded-full bg-base-200 text-lg border-none w-full" placeholder="Enter 4 digit pin number" />
          <button id="cashout-btn" class="btn btn-primary mt-4 rounded-full">Withdraw Money</button>
        </fieldset>
      </div>
    </div>
    </section>

    <section id="send-money" class="w-11/12 mx-auto py-4 hidden">
        <h2 class="text-xl text-nutral font-semibold pb-4">Send Money</h2>
         <div class="card bg-base-100 w-full shadow-xl mx-auto rounded-3xl">
      <div class="card-body">
        <fieldset class="fieldset text-xl">
          <label class="label mb-2 text-neutral/70 font-medium">User Account Number</label>
          <input id="send-money-number" maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200 text-lg mb-2 border-none w-full" placeholder="Enter 11 digit number"/>
          <label class="label mb-2 text-neutral/70 font-medium">Amount</label>
          <input id="send-money-amount" type="number" class="input rounded-full bg-base-200 text-lg mb-2 border-none w-full" placeholder="Enter amount to transfer"/>
          <label class="label mb-2 text-neutral/70 font-medium">Pin Number</label>
          <input id="send-money-pin" maxlength="4" type="password" class="input rounded-full bg-base-200 text-lg border-none w-full" placeholder="Enter 4 digit pin number" />
          <button id="send-money-btn" class="btn btn-primary mt-4 rounded-full">Send Now</button>
        </fieldset>
      </div>
    </div>
    </section>

    <section id="get-bonus" class="w-11/12 mx-auto py-4 hidden">
        <h2 class="text-xl text-nutral font-semibold pb-4">Get Bonus</h2>
         <div class="card bg-base-100 w-full shadow-xl mx-auto rounded-3xl">
      <div class="card-body">
        <fieldset class="fieldset text-xl">
          <label class="label mb-2 text-neutral/70 font-medium">Enter Bonus Coupon</label>
          <input id="get-bonus-coupon" maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200 text-lg mb-2 border-none w-full" placeholder="Enter your coupon"/>
          <button id="get-bonus-btn" class="btn btn-primary mt-4 rounded-full">Get Bonus</button>
        </fieldset>
      </div>
    </div>
    </section>

    <section id="pay-bill" class="w-11/12 mx-auto py-4 hidden">
        <h2 class="text-xl text-nutral font-semibold pb-4">Pay Bill</h2>
       <div class="card bg-base-100 w-full shadow-xl mx-auto rounded-3xl">
       <div class="card-body">
        <fieldset class="fieldset text-xl">
          <label class="label mb-2 text-neutral/70 font-medium">Select To Pay</label>
          <select id="pay-bill-bank" class="select w-full rounded-full text-neutral/60 text-lg bg-base-200 border-none mb-2">
             <option disabled selected>Select bank</option>
             <option value="DBBL">DBBL</option>
             <option value="IBBL">IBBL</option>
             <option value="City Bank">City Bank</option>
          </select>
          <label class="label mb-2 text-neutral/70 font-medium">Biller Account Number</label>
          <input id="pay-bill-account" type="number" class="input rounded-full bg-base-200 text-lg mb-2 border-none w-full" placeholder="Enter 11 digit account number"/>
          <label class="label mb-2 text-neutral/70 font-medium">Amount to Pay</label>
          <input id="pay-bill-amount" type="number" class="input rounded-full bg-base-200 text-lg mb-2 border-none w-full" placeholder="Add Amount to Pay"/>
          <label class="label mb-2 text-neutral/70 font-medium">Pin Number</label>
          <input id="pay-bill-pin" maxlength="4" type="password" class="input rounded-full bg-base-200 text-lg border-none w-full" placeholder="Enter 4 digit pin number" />
          <button id="pay-bill-btn" class="btn btn-primary mt-4 rounded-full">Pay Now</button>
        </fieldset>
      </div>
    </div>
    </section>

    <section id="history" class="w-11/12 mx-auto py-4 hidden">
      <h2 class="text-xl text-nutral font-semibold">Transaction History</h2>
      <div id="history-container" class="space-y-5">
        <div class="transection-card bg-base-200 p-5">

        </div>
      </div>
    </section>

    <script src="./script/machine.js"></script>
    <script src="./script/add-money.js"></script>
    <script src="./script/cashout.js"></script>
    <script src="./script/send-money.js"></script>
    <script src="./script/get-bonus.js"></script>
    <script src="./script/pay-bill.js"></script>
</body>
