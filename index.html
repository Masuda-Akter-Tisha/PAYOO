<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Login</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- tailwind css + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
   * {
     font-family: "Outfit", sans-serif;
    }
    </style>
</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">
   <div class="logo w-[200px] mx-auto pt-52">
    <img src="./assets/Logo-full.png" alt="">
   </div>

   <div class="form pt-10 max-w-sm mx-auto rounded-full">
      <div class="card bg-base-100 w-full shrink-0 shadow-2xl">
      <div class="card-body">
        <fieldset class="fieldset text-xl">
          <label class="label mb-2 text-base-content">Mobile Number</label>
          <input type="email" class="input rounded-full bg-base-200 text-lg mb-2 border-none" placeholder="Enter your number" />
          <label class="label mb-2 text-base-content">4 Digit Pin</label>
          <input type="password" class="input rounded-full bg-base-200 text-lg border-none" placeholder="Enter 4 Digit Pin" />
          <button class="btn btn-primary mt-4 rounded-full">Login</button>
        </fieldset>
      </div>
    </div>
   </div>
</body>
</html>
